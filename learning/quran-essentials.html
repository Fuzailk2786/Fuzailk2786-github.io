<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qur'an Essentials - Islamic Questz</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #064e3b;
      --emerald: #065f46; --gold: #b45309; --soft-gold: #fef3c7;
      --border: #e2e8f0; --shadow: rgba(0,0,0,0.1);
    }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg-color); 
      margin: 0; 
      color: var(--text-main); 
      overflow-x: hidden;
    }
    .app-card { margin: 0 auto; max-width: 500px; padding: 20px; }
    
    .main-btn { 
      background: var(--card-bg); border: 1px solid var(--border); 
      padding: 15px; border-radius: 15px; cursor: pointer; 
      transition: 0.2s; font-weight: 600; color: var(--text-main); 
      width: 100%; margin-bottom: 10px; text-align: left;
    }
    .main-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
    .back-btn { background: none; border: none; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 1rem; margin:0;}
    .hidden { display: none !important; }

    /* New Sidebars CSS for Feature 2 & 3 */
    .sidebar { 
      position: fixed; top: 0; height: 100%; width: 280px; 
      background: var(--card-bg); z-index: 3000; 
      box-shadow: 0 0 15px rgba(0,0,0,0.5); 
      transition: transform 0.3s ease; padding: 20px; 
      overflow-y: auto; box-sizing: border-box;
    }
    .left-sidebar { left: 0; transform: translateX(-100%); }
    .left-sidebar.open { transform: translateX(0); }
    .right-sidebar { right: 0; transform: translateX(100%); }
    .right-sidebar.open { transform: translateX(0); }
    
    .close-btn { background: none; border: none; font-size: 2rem; float: right; cursor: pointer; color: var(--gold); line-height: 0.8; margin-bottom: 10px;}
    .topic-link { display: block; padding: 15px 10px; border-bottom: 1px solid var(--border); color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.2s;}
    .topic-link:hover { background: var(--soft-gold); border-radius: 8px; border-bottom: none;}
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px var(--shadow); }
  </style>
</head>
<body>

  <div id="progress-sidebar" class="sidebar left-sidebar">
    <button class="close-btn" onclick="toggleProgress()">×</button>
    <h3 style="font-family:'Cinzel'; color:var(--emerald); margin-top:0;">📊 My Progress</h3>
    <div id="progress-list"></div>
  </div>

  <div id="topics-sidebar" class="sidebar right-sidebar">
    <button class="close-btn" onclick="toggleTopics()">×</button>
    <h3 style="font-family:'Cinzel'; color:var(--emerald); margin-top:0;">📚 All Topics</h3>
    <a href="quran-essentials.html" class="topic-link">Qur'an Essentials</a>
    <a href="hadith-sciences.html" class="topic-link">Hadith & Hadith Sciences</a>
    <a href="seerah.html" class="topic-link">Seerah (Life of Prophet)</a>
    <a href="aqeedah.html" class="topic-link">Aqeedah - Creation to Hereafter</a>
    <a href="fiqh.html" class="topic-link">Fiqh of Worship</a>
    <a href="manners.html" class="topic-link">Manners & Akhlaq</a>
    <a href="general-knowledge.html" class="topic-link">General Knowledge</a>
  </div>

  <div id="app-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; text-align: center; border: 2px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
      <div id="modal-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
      <h3 id="modal-title" style="font-family: 'Cinzel'; margin-top: 0; color: var(--emerald);"></h3>
      <p id="modal-message" style="margin-bottom: 25px; line-height: 1.5; color: var(--text-main); white-space: pre-wrap; text-align: left;"></p>
      <button id="modal-btn" class="main-btn" style="text-align:center; background: var(--emerald); color: white; border: none;">Continue</button>
    </div>
  </div>

  <div class="app-card">
    
    <div class="top-nav">
      <button class="back-btn" onclick="window.location.href='../index.html?skipSplash=true&screen=learning'">← Menu</button>
      <div style="display:flex; gap:10px;">
        <button class="main-btn" style="padding: 8px 12px; margin:0; width:auto; background:var(--emerald); color:white;" onclick="toggleProgress()">📊 Progress</button>
        <button class="main-btn" style="padding: 8px 12px; margin:0; width:auto;" onclick="toggleTopics()">📚 Topics</button>
      </div>
    </div>
    
    <h2 id="page-title" style="font-family: 'Cinzel'; text-align:center; color: var(--emerald);"></h2>
    
    <div id="quiz-area" style="margin-top: 20px;"></div>
  </div>

  <script>
    // ==========================================
    // 1. UPDATE YOUR TOPIC INFO HERE FOR EACH FILE
    // ==========================================
    const PAGE_TITLE = "Qur'an Essentials";
    const QUESTIONS = [
      {
        q: "How many Juz’ (parts) is the Qur’an divided into for recitation?",
        qh: "Quran ko tilawat ke liye kitne Juz’ (parts) mein taqseem kiya gaya hai?",
        o: ["7", "30", "60", "114"],
        oh: ["7", "30", "60", "114"],
        a: "30",
        e: "The Qur’an is divided into 30 Ajza’ for convenient monthly recitation.",
        eh: "Quran ko 30 Juz’ mein baanta gaya hai taaki mahine bhar mein aasani se mukammal kiya ja sake."
      },
      {
        q: "How many Surahs are in the Qur’an?",
        qh: "Quran mein kul kitni Suratein hain?",
        o: ["100", "112", "114", "120"],
        oh: ["100", "112", "114", "120"],
        a: "114",
        e: "The Qur’an comprises 114 Surahs revealed over 23 years.",
        eh: "Quran 114 Suraton par mushtamil hai, 23 saalon mein nazil hua."
      },
      {
        q: "Which Surah is known as the Opening of the Book?",
        qh: "Kaunsi Surah ko 'The Opening' kehte hain?",
        o: ["Al-Baqarah", "Al-Fatihah", "Al-Ikhlas", "Al-Mulk"],
        oh: ["Al-Baqarah", "Al-Fatihah", "Al-Ikhlas", "Al-Mulk"],
        a: "Al-Fatihah",
        e: "Al-Fatihah opens the Qur’an and summarizes core themes: praise, servitude, guidance.",
        eh: "Al-Fatihah Quran ki ibtida hai; isme hamd, bandagi aur hidayat ke bunyadi mauzuaat hain."
      },
      {
        q: "What do 'Makki' and 'Madani' Surahs primarily indicate?",
        qh: "'Makki' aur 'Madani' Surah se kya murad hoti hai?",
        o: ["Theme", "Place/period of revelation", "Length", "Recitation speed"],
        oh: ["Mauzu", "Nazool ki jagah/daur", "Lambai", "Tilawat ki raftaar"],
        a: "Place/period of revelation",
        e: "Makki = before Hijrah; Madani = after Hijrah, regardless of current location.",
        eh: "Makki wahi Hijrat se pehle, Madani Hijrat ke baad—chahe us waqt jagah koi ho."
      },
      {
        q: "Which Surah’s first verses were the first revelation to the Prophet ﷺ?",
        qh: "Kaunsi Surah ki ibtidaai ayat pehli wahi thin?",
        o: ["Al-Qalam", "Al-Alaq", "Al-Muddaththir", "Al-Qadr"],
        oh: ["Al-Qalam", "Al-Alaq", "Al-Muddaththir", "Al-Qadr"],
        a: "Al-Alaq",
        e: "“Read in the name of your Lord…” appears in Al-Alaq (96:1-5).",
        eh: "‘Iqra’ bismi rabbika…’ Surah Al-Alaq (96:1–5) mein aaya."
      },
      {
        q: "What is 'Tajwid' in Qur’an recitation?",
        qh: "Quran ki tilawat mein 'Tajwid' se kya murad hai?",
        o: ["Memorization", "Rules of proper pronunciation", "Translation", "History"],
        oh: ["Hifz", "Sahi talafuz ke qawaid", "Tarjuma", "Tareekh"],
        a: "Rules of proper pronunciation",
        e: "Tajwid preserves correct articulation and elongations.",
        eh: "Tajwid huruf ki durust adaigi aur madd waghera ke qawaid par mabni hai."
      },
      {
        q: "Which Surah repeats a refrain about Allah’s favors many times?",
        qh: "Kaunsi Surah Allah ki ne’maton ka zikar baar-baar karti hai?",
        o: ["Ar-Rahman", "Al-Hadid", "Yasin", "Az-Zumar"],
        oh: ["Ar-Rahman", "Al-Hadid", "Yasin", "Az-Zumar"],
        a: "Ar-Rahman",
        e: "“Which of your Lord’s favors will you both deny?” is repeated in Ar-Rahman.",
        eh: "‘Tum apne Rab ki kaun kaun si ne’maton ko jhutlaoge?’ Surah Ar-Rahman mein dohraya jata hai."
      },
      {
        q: "What are Ayat al-Sajdah?",
        qh: "Ayat al-Sajdah kya hoti hain?",
        o: ["Verses of law", "Prostration verses", "Verses of light", "Abrogated verses"],
        oh: ["Ahkam ki ayat", "Sajde ki ayat", "Noor ki ayat", "Mansookh ayat"],
        a: "Prostration verses",
        e: "They are verses upon which Sajdah at-Tilawah is performed.",
        eh: "Ye aisi ayatein hain jinke padhne/sunne par Sajda-e-Tilawat kiya jata hai."
      },
      {
        q: "Which Surah is recommended on Fridays for spiritual light?",
        qh: "Jummah ko kis Surah ki tilawat ki sifarish ki gayi hai?",
        o: ["Al-Mulk", "Al-Kahf", "Al-Waqi’ah", "Yasin"],
        oh: ["Al-Mulk", "Al-Kahf", "Al-Waqi’ah", "Yasin"],
        a: "Al-Kahf",
        e: "Surah Al-Kahf is mustahab on Fridays; it provides spiritual light and protection.",
        eh: "Jummah ko Surah Al-Kahf padhna mustahab hai; ye roshni aur hifazat ka zariya hai."
      },
      {
        q: "Which Surah summarizes Divine Oneness succinctly?",
        qh: "Kaunsi Surah tauheed ko mukhtasar taur par bayan karti hai?",
        o: ["Al-Ikhlas", "Al-Fatihah", "An-Nas", "Al-Falaq"],
        oh: ["Al-Ikhlas", "Al-Fatihah", "An-Nas", "Al-Falaq"],
        a: "Al-Ikhlas",
        e: "Al-Ikhlas affirms Allah’s absolute Oneness.",
        eh: "Al-Ikhlas Allah ki yaktaai ko wazeh taur par bayan karti hai."
      },
      {
        q: "Which compilation divides the Qur’an into seven roughly equal portions?",
        qh: "Quran ko 7 barabar hisson (Manzil) mein kaunsi taqsim karti hai?",
        o: ["Hizb", "Manzil", "Ruku", "Juz’"],
        oh: ["Hizb", "Manzil", "Ruku", "Juz’"],
        a: "Manzil",
        e: "Some readers use seven Manazil for weekly completion.",
        eh: "Kuch log hafte bhar mein Quran mukammal karne ko 7 Manzil parhte hain."
      },
      {
        q: "What does 'Hizb' denote in the Qur’an division system?",
        qh: "Quran ki taqsim mein 'Hizb' se kya murad hai?",
        o: ["Half of a Juz’", "One ruku", "One page", "One surah"],
        oh: ["Juz’ ka aadha", "Ek ruku", "Ek safha", "Ek surah"],
        a: "Half of a Juz’",
        e: "Each Juz’ is typically split into two Hizb.",
        eh: "Aksar har Juz’ ko 2 Hizb mein taqseem kiya jata hai."
      },
      {
        q: "Which Surah is often called the 'heart of the Qur’an' in many communities?",
        qh: "Kaunsi Surah ko kai maqamat par 'Quran ka dil' kaha jata hai?",
        o: ["Yasin", "Rahman", "Mulk", "Kahf"],
        oh: ["Yasin", "Rahman", "Mulk", "Kahf"],
        a: "Yasin",
        e: "Many refer to Surah Yasin as the 'heart of the Qur’an' due to its themes and impact.",
        eh: "Surah Yasin ko aam tor par 'Quran ka dil' kaha jata hai."
      },
      {
        q: "Which Surah emphasizes seeking protection with the Lord of mankind?",
        qh: "Kaunsi Surah mein Rabbin-Naas se hifazat ki dua ki gayi hai?",
        o: ["An-Nas", "Al-Falaq", "Al-Ikhlas", "Al-Kafirun"],
        oh: ["An-Nas", "Al-Falaq", "Al-Ikhlas", "Al-Kafirun"],
        a: "An-Nas",
        e: "Surah An-Nas seeks protection from the whispers of the shayatin.",
        eh: "Surah An-Nas shayateen ke waswaso se panaah maangti hai."
      },
      {
        q: "Which Surah concludes the Qur’an?",
        qh: "Quran ki aakhri Surah kaunsi hai?",
        o: ["Al-Falaq", "An-Nas", "An-Nasr", "Al-Fil"],
        oh: ["Al-Falaq", "An-Nas", "An-Nasr", "Al-Fil"],
        a: "An-Nas",
        e: "The Qur’an closes with the Mu’awwizatayn (Falaq and Nas).",
        eh: "Quran ka ikhtitam Mu’awwizatayn (Falaq aur Nas) par hota hai."
      },
      {
        q: "Which Surah instructs believers not to enter homes without permission?",
        qh: "Kaunsi Surah mein ijazat ke baghair gharon mein dakhil na hone ki hidayat hai?",
        o: ["An-Nur", "Al-Ahzab", "An-Nisa", "Al-Hujurat"],
        oh: ["An-Nur", "Al-Ahzab", "An-Nisa", "Al-Hujurat"],
        a: "An-Nur",
        e: "Surah An-Nur addresses social etiquette including seeking permission before entering homes.",
        eh: "Surah An-Nur muashrati adaab sikhati hai, jisme ijazat ke baghair dakhil na hona shamil hai."
      }
    ];

    let currentIndex = 0;

    // ==========================================
    // SIDEBAR & PROGRESS LOGIC
    // ==========================================
    function toggleProgress() {
      document.getElementById('progress-sidebar').classList.toggle('open');
      document.getElementById('topics-sidebar').classList.remove('open');
      renderProgress();
    }
    
    function toggleTopics() {
      document.getElementById('topics-sidebar').classList.toggle('open');
      document.getElementById('progress-sidebar').classList.remove('open');
    }

    function renderProgress() {
       let savedProgress = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
       let html = '';
       const allTopics = [
         "Qur'an Essentials", "Hadith & Hadith Sciences", "Seerah (Life of the Prophet ﷺ)", 
         "Aqeedah - Creation to Hereafter", "Fiqh of Worship (Non-Ramadan)", 
         "Manners & Akhlaq", "General Knowledge (Islamic Themes)"
       ];
       
       allTopics.forEach(t => {
           let score = savedProgress[t] || 0;
           let isCurrent = (t === PAGE_TITLE) ? "background: var(--soft-gold);" : "";
           html += `<div style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding: 10px; border-radius:8px; ${isCurrent}">
               <div style="color:var(--text-main); font-weight:600; line-height:1.2; margin-bottom:5px;">${t}</div>
               <span style="color:var(--emerald); font-size: 0.85rem; font-weight:bold;">📍 Completed: ${score}</span>
           </div>`;
       });
       document.getElementById('progress-list').innerHTML = html;
    }

    function saveProgress() {
        let prog = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
        // Save the highest question number they reached
        prog[PAGE_TITLE] = Math.max(prog[PAGE_TITLE] || 0, currentIndex + 1);
        localStorage.setItem('iq_learning_prog', JSON.stringify(prog));
    }

    // ==========================================
    // QUIZ LOGIC
    // ==========================================
    function showPopup(title, message, icon, callback) {
      const modal = document.getElementById('app-modal');
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('modal-icon').innerText = icon || '';
      modal.classList.remove('hidden');
      document.getElementById('modal-btn').onclick = () => {
        modal.classList.add('hidden');
        if (callback) callback();
      };
    }

    function loadQuestion() {
      const qData = QUESTIONS[currentIndex];
      const area = document.getElementById('quiz-area');
      
      let html = `
        <p style="color:var(--gold); font-weight:600; text-align:center;">Question ${currentIndex + 1} of ${QUESTIONS.length}</p>
        <div style="margin-bottom:20px; background: var(--soft-gold); padding: 15px; border-radius: 10px; border: 1px solid var(--gold);">
          <h4 style="margin-top:0; margin-bottom:5px; line-height:1.4;">${qData.q}</h4>
          <p style="margin:0; font-style:italic; color:var(--emerald); font-size:0.95rem;">${qData.qh || ""}</p>
        </div>
        <div id="options-box"></div>
      `;
      area.innerHTML = html;

      const optionsBox = document.getElementById('options-box');
      
      qData.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'main-btn';
        const hinglishOpt = (qData.oh && qData.oh[i]) ? `<br><span style="font-size:0.85rem; opacity:0.8;">${qData.oh[i]}</span>` : "";
        btn.innerHTML = `<strong>${opt}</strong>${hinglishOpt}`;
        btn.onclick = () => checkAnswer(opt, qData);
        optionsBox.appendChild(btn);
      });
    }

    function checkAnswer(selectedOption, qData) {
      const isCorrect = selectedOption === qData.a;
      const title = isCorrect ? "Correct! ✨" : "Explanation";
      const icon = isCorrect ? "✅" : "ℹ️";
      
      const fullExplanation = (qData.e || "") + (qData.eh ? `\n\n(${qData.eh})` : "");

      showPopup(title, fullExplanation, icon, () => {
        saveProgress(); // Automatically saves progress on every question!
        
        currentIndex++;
        if (currentIndex < QUESTIONS.length) {
          loadQuestion();
        } else {
          showPopup("Topic Completed!", "Masha'Allah, you have finished this learning module.", "🎓", () => {
            window.location.href = '../index.html?skipSplash=true&screen=learning'; 
          });
        }
      });
    }

    window.onload = () => {
      document.getElementById('page-title').innerText = PAGE_TITLE;
      loadQuestion();
    };
  </script>
</body>
</html>
