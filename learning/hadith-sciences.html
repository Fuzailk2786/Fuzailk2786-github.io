        e: "Ma'lul means affected by a subtle, hidden defect.",
        eh: "Ma'lul me ek naazuk pinhawa nuqs hota hai jo mahir pehchante."
      },
      {
        q: "Which collection by Imam Malik is among the earliest hadith compendia?",
        qh: "Imam Malik ki kaunsi hadith majmu'a sab se purani majame' me shumar hoti?",
        o: ["Al-Muwatta", "Musnad Ahmad", "Sahih Muslim", "Sunan Abi Dawud"],
        a: "Al-Muwatta",
        e: "Al-Muwatta compiles hadith and athar with Madinan practice.",
        eh: "Al-Muwatta riwayat aur Madani 'amal ko jama karti hai."
      },
      {
        q: "What does 'Tabaqat' literature focus on?",
        qh: "'Tabaqat' adab/kutub me aam tor par kis par focus hota?",
        o: ["Biographical layers of narrators/scholars", "Only grammar", "Only tafsir", "Only fiqh verdicts"],
        a: "Biographical layers of narrators/scholars",
        e: "Tabaqat classifies scholars in generations/levels.",
        eh: "Tabaqat uloom ke ahl ko tabaqat me taqseem karti."
      },
      {
        q: "Which scholar compiled 'Sahih Ibn Khuzaymah' and 'Sahih Ibn Hibban' style works (two different scholars)?",
        qh: "Kaun se muhaddisin ne 'Sahih Ibn Khuzaymah' aur 'Sahih Ibn Hibban' qisam ki kutub tahrir ki (do alag ulama)?",
        o: ["Ibn Khuzaymah & Ibn Hibban", "Ibn Hibban & Al-Hakim", "Al-Bukhari & Muslim", "Ibn Majah & Nasa'i"],
        a: "Ibn Khuzaymah & Ibn Hibban",
        e: "Both authored important hadith works classifying authentic reports.",
        eh: "Dono ne aham sihah kutub ta'lif ki."
      },
      {
        q: "Which of the following is a hadith commentary (sharh) work?",
        qh: "In me se kaunsi hadith ki sharh (commentary) kitaab hai?",
        o: ["Fath al-Bari", "Tafsir al-Jalalayn", "Al-Ahkam as-Sultaniyyah", "Al-Muwatta"],
        a: "Fath al-Bari",
        e: "Ibn Hajar's Fath al-Bari is a celebrated commentary on Sahih Bukhari.",
        eh: "Ibn Hajar ki Fath al-Bari Sahih Bukhari par mashhoor sharh hai."
      },
      {
        q: "What is the primary difference between 'Sunan' and 'Jami'' books?",
        qh: "'Sunan' aur 'Jami'' kutub me bunyadi farq kya hai?",
        o: ["Sunan focus on legal chapters; Jami' cover broader subjects", "Both exactly same", "Jami' only on grammar", "Sunan only biographies"],
        a: "Sunan focus on legal chapters; Jami' cover broader subjects",
        e: "Sunan organize by fiqh topics; Jami' aim for eight categories (aqidah, adab, tafsir, etc.).",
        eh: "Sunan fiqhi abwab par; Jami' wasaa mauzuaat shamil karte."
      },
      {
        q: "Which is an example of a hadith encyclopedia with extensive chains and variants?",
        qh: "Kaunsi hadith daira-ma'arif (encyclopedia) misali tor par bohat se sanad/riwayat jama karti?",
        o: ["Majma' az-Zawa'id", "Al-Muwatta", "Ar-Risalah", "Al-Minhaj"],
        a: "Majma' az-Zawa'id",
        e: "Al-Haythami's work compiles additional chains and variants across collections.",
        eh: "Al-Haythami ne mukhtalif majame' se zawa'id ko jama kiya."

      {
        q: "What is a key objective of hadith memorization (hifz al-hadith)?",
        qh: "Hadith hifz karne ka aham maqsad kya hai?",

        a: "Preservation, quick recall, and cross-verification",
        e: "Hifz supports isnad verification and precise transmission.",
        eh: "Hifz se sanad ki tasdeeq aur sahih naql me madad milti."
      },
      {
        q: "Which term denotes narrations from the Companions (not marfu' to the Prophet)?",
        qh: "Kaunsi istilah se Sahaba ki riwayat (jo marfu' na ho) ko pukara jata?",
        o: ["Athar", "Marfu'", "Mawquf", "Maudu'"],
        a: "Athar",
        e: "Athar can refer to reports from Companions/Successors as well.",
        eh: "Athar aksar Sahaba/Tabi'een ki riwayaat par bhi bola jata."
      }
    ];
    let currentIndex = 0;

    // ==========================================
    // SIDEBAR & PROGRESS LOGIC
    // ==========================================
    function toggleProgress() {
      document.getElementById('progress-sidebar').classList.toggle('open');
      document.getElementById('topics-sidebar').classList.remove('open');
      renderProgress();
    }
    
    function toggleTopics() {
      document.getElementById('topics-sidebar').classList.toggle('open');
      document.getElementById('progress-sidebar').classList.remove('open');
    }

    function renderProgress() {
       let savedProgress = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
       let html = '';
       const allTopics = [
         "Qur'an Essentials", "Hadith & Hadith Sciences", "Seerah (Life of the Prophet ﷺ)", 
         "Aqeedah - Creation to Hereafter", "Fiqh of Worship (Non-Ramadan)", 
         "Manners & Akhlaq", "General Knowledge (Islamic Themes)"
       ];
       
       allTopics.forEach(t => {
           let score = savedProgress[t] || 0;
           let isCurrent = (t === PAGE_TITLE) ? "background: var(--soft-gold);" : "";
           html += `<div style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding: 10px; border-radius:8px; ${isCurrent}">
               <div style="color:var(--text-main); font-weight:600; line-height:1.2; margin-bottom:5px;">${t}</div>
               <span style="color:var(--emerald); font-size: 0.85rem; font-weight:bold;">📍 Completed: ${score}</span>
           </div>`;
       });
       document.getElementById('progress-list').innerHTML = html;
    }

    function saveProgress() {
        let prog = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
        // Save the highest question number they reached
        prog[PAGE_TITLE] = Math.max(prog[PAGE_TITLE] || 0, currentIndex + 1);
        localStorage.setItem('iq_learning_prog', JSON.stringify(prog));
    }

    // ==========================================
    // QUIZ LOGIC
    // ==========================================
    function showPopup(title, message, icon, callback) {
      const modal = document.getElementById('app-modal');
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('modal-icon').innerText = icon || '';
      modal.classList.remove('hidden');
      document.getElementById('modal-btn').onclick = () => {
        modal.classList.add('hidden');
        if (callback) callback();
      };
    }

    function loadQuestion() {
      const qData = QUESTIONS[currentIndex];
      const area = document.getElementById('quiz-area');
      
      let html = `
        <p style="color:var(--gold); font-weight:600; text-align:center;">Question ${currentIndex + 1} of ${QUESTIONS.length}</p>
        <div style="margin-bottom:20px; background: var(--soft-gold); padding: 15px; border-radius: 10px; border: 1px solid var(--gold);">
          <h4 style="margin-top:0; margin-bottom:5px; line-height:1.4;">${qData.q}</h4>
          <p style="margin:0; font-style:italic; color:var(--emerald); font-size:0.95rem;">${qData.qh || ""}</p>
        </div>
        <div id="options-box"></div>
      `;
      area.innerHTML = html;

      const optionsBox = document.getElementById('options-box');
      
      qData.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'main-btn';
        const hinglishOpt = (qData.oh && qData.oh[i]) ? `<br><span style="font-size:0.85rem; opacity:0.8;">${qData.oh[i]}</span>` : "";
        btn.innerHTML = `<strong>${opt}</strong>${hinglishOpt}`;
        btn.onclick = () => checkAnswer(opt, qData);
        optionsBox.appendChild(btn);
      });
    }

    function checkAnswer(selectedOption, qData) {
      const isCorrect = selectedOption === qData.a;
      const title = isCorrect ? "Correct! ✨" : "Explanation";
      const icon = isCorrect ? "✅" : "ℹ️";
      
      const fullExplanation = (qData.e || "") + (qData.eh ? `\n\n(${qData.eh})` : "");

      showPopup(title, fullExplanation, icon, () => {
        saveProgress(); // Automatically saves progress on every question!
        
        currentIndex++;
        if (currentIndex < QUESTIONS.length) {
          loadQuestion();
        } else {
          showPopup("Topic Completed!", "Masha'Allah, you have finished this learning module.", "🎓", () => {
            window.location.href = '../index.html?skipSplash=true&screen=learning'; 
          });
        }
      });
    }

    window.onload = () => {
      document.getElementById('page-title').innerText = PAGE_TITLE;
      loadQuestion();
    };
  </script>
</body>
</html>
