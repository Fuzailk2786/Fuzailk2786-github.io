    let currentIndex = 0;

    // ==========================================
    // SIDEBAR & PROGRESS LOGIC
    // ==========================================
    function toggleProgress() {
      document.getElementById('progress-sidebar').classList.toggle('open');
      document.getElementById('topics-sidebar').classList.remove('open');
      renderProgress();
    }
    
    function toggleTopics() {
      document.getElementById('topics-sidebar').classList.toggle('open');
      document.getElementById('progress-sidebar').classList.remove('open');
    }

    function renderProgress() {
       let savedProgress = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
       let html = '';
       const allTopics = [
         "Qur'an Essentials", "Hadith & Hadith Sciences", "Seerah (Life of the Prophet ﷺ)", 
         "Aqeedah - Creation to Hereafter", "Fiqh of Worship (Non-Ramadan)", 
         "Manners & Akhlaq", "General Knowledge (Islamic Themes)"
       ];
       
       allTopics.forEach(t => {
           let score = savedProgress[t] || 0;
           let isCurrent = (t === PAGE_TITLE) ? "background: var(--soft-gold);" : "";
           html += `<div style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding: 10px; border-radius:8px; ${isCurrent}">
               <div style="color:var(--text-main); font-weight:600; line-height:1.2; margin-bottom:5px;">${t}</div>
               <span style="color:var(--emerald); font-size: 0.85rem; font-weight:bold;">📍 Completed: ${score}</span>
           </div>`;
       });
       document.getElementById('progress-list').innerHTML = html;
    }

    function saveProgress() {
        let prog = JSON.parse(localStorage.getItem('iq_learning_prog') || '{}');
        // Save the highest question number they reached
        prog[PAGE_TITLE] = Math.max(prog[PAGE_TITLE] || 0, currentIndex + 1);
        localStorage.setItem('iq_learning_prog', JSON.stringify(prog));
    }

    // ==========================================
    // QUIZ LOGIC
    // ==========================================
    function showPopup(title, message, icon, callback) {
      const modal = document.getElementById('app-modal');
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('modal-icon').innerText = icon || '';
      modal.classList.remove('hidden');
      document.getElementById('modal-btn').onclick = () => {
        modal.classList.add('hidden');
        if (callback) callback();
      };
    }

    function loadQuestion() {
      const qData = QUESTIONS[currentIndex];
      const area = document.getElementById('quiz-area');
      
      let html = `
        <p style="color:var(--gold); font-weight:600; text-align:center;">Question ${currentIndex + 1} of ${QUESTIONS.length}</p>
        <div style="margin-bottom:20px; background: var(--soft-gold); padding: 15px; border-radius: 10px; border: 1px solid var(--gold);">
          <h4 style="margin-top:0; margin-bottom:5px; line-height:1.4;">${qData.q}</h4>
          <p style="margin:0; font-style:italic; color:var(--emerald); font-size:0.95rem;">${qData.qh || ""}</p>
        </div>
        <div id="options-box"></div>
      `;
      area.innerHTML = html;

      const optionsBox = document.getElementById('options-box');
      
      qData.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'main-btn';
        const hinglishOpt = (qData.oh && qData.oh[i]) ? `<br><span style="font-size:0.85rem; opacity:0.8;">${qData.oh[i]}</span>` : "";
        btn.innerHTML = `<strong>${opt}</strong>${hinglishOpt}`;
        btn.onclick = () => checkAnswer(opt, qData);
        optionsBox.appendChild(btn);
      });
    }

    function checkAnswer(selectedOption, qData) {
      const isCorrect = selectedOption === qData.a;
      const title = isCorrect ? "Correct! ✨" : "Explanation";
      const icon = isCorrect ? "✅" : "ℹ️";
      
      const fullExplanation = (qData.e || "") + (qData.eh ? `\n\n(${qData.eh})` : "");

      showPopup(title, fullExplanation, icon, () => {
        saveProgress(); // Automatically saves progress on every question!
        
        currentIndex++;
        if (currentIndex < QUESTIONS.length) {
          loadQuestion();
        } else {
          showPopup("Topic Completed!", "Masha'Allah, you have finished this learning module.", "🎓", () => {
            window.location.href = '../index.html?skipSplash=true&screen=learning'; 
          });
        }
      });
    }

    window.onload = () => {
      document.getElementById('page-title').innerText = PAGE_TITLE;
      loadQuestion();
    };
  </script>
