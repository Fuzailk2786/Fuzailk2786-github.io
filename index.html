<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Islamic Questz - 2026</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #064e3b;
      --emerald: #065f46; --gold: #b45309; --soft-gold: #fef3c7;
      --border: #e2e8f0; --shadow: rgba(0,0,0,0.1);
    }
    [data-theme="dark"] {
      --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
      --emerald: #10b981; --gold: #fbbf24; --soft-gold: #334155;
      --border: #334155; --shadow: rgba(0,0,0,0.4);
    }
    body { font-family: 'Poppins', sans-serif; background: var(--bg-color); margin: 0; color: var(--text-main); transition: 0.3s; overflow-x: hidden; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #bismillah-overlay { position: fixed; inset: 0; background: #064e3b; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: 1s; pointer-events: none; user-select: none; }
    .bismillah-text { color: #fbbf24; font-size: 2rem; margin-bottom: 20px; font-family: 'Cinzel'; opacity: 0; animation: fadeIn 2s forwards; }
    #sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: var(--card-bg); z-index: 2000; transition: 0.3s; box-shadow: -5px 0 15px var(--shadow); padding-top: 20px; }
    #sidebar.open { right: 0; }
    .profile-section { padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--soft-gold); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid var(--gold); position: relative; cursor: pointer; overflow: hidden; }
    #profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .nav-item { padding: 12px 25px; display: flex; align-items: center; gap: 10px; color: var(--text-main); text-decoration: none; cursor: pointer; border-bottom: 1px solid var(--border); }
    .nav-item:hover { background: var(--soft-gold); }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .main-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.2s; font-weight: 600; color: var(--text-main); text-align: center; }
    .main-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
    .dua-card { background: var(--card-bg); border-left: 5px solid var(--gold); padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px var(--shadow); }
    .hidden { display: none !important; }
    #menu-btn { position: fixed; top: 15px; right: 15px; font-size: 1.5rem; z-index: 2001; cursor: pointer; background: var(--gold); color: white; border: none; border-radius: 8px; width: 40px; height: 40px; }
    .back-btn { background: none; border: none; color: var(--gold); font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 1rem; }
  </style>
</head>
<body>

  <div id="bismillah-overlay">
    <div class="bismillah-text">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
    <div style="color: white; letter-spacing: 2px;">ISLAMIC QUESTZ</div>
  </div>

  <div id="app-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; text-align: center; border: 2px solid var(--gold);">
      <div id="modal-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
      <h3 id="modal-title" style="font-family: 'Cinzel'; color: var(--emerald);"></h3>
      <p id="modal-message" style="margin-bottom: 25px; color: var(--text-main);"></p>
      <button id="modal-btn" class="main-btn" style="width: 100%; background: var(--emerald); color: white;">Continue</button>
    </div>
  </div>

  <button id="menu-btn" class="hidden" onclick="toggleMenu()">☰</button>

  <nav id="sidebar">
    <div class="profile-section">
      <div class="avatar" onclick="document.getElementById('upload-pic').click()">
        <span id="avatar-init">?</span>
        <img id="profile-img" src="" alt="Profile">
      </div>
      <input type="file" id="upload-pic" class="hidden" accept="image/*" onchange="uploadImage(this)">
      <div id="user-display-name" style="font-weight: 600; margin-top: 5px;">Guest User</div>
    </div>
    <div class="nav-item" onclick="showScreen('home');">🏠 Home</div>
    <div class="nav-item" onclick="showDailyQuran();">📖 Qur'an Journey</div>
    <div class="nav-item" onclick="showScreen('ramadan-grid');">🌙 Ramadan Quiz</div>
    <div class="nav-item" onclick="openLearningQuiz();">📖 Knowledge & Learning</div>
    <div class="nav-item" onclick="loadLeaderboard();">🏆 Leaderboard</div>
    <div class="nav-item" onclick="showQiblaCompass();">🕋 Qibla Direction</div>
    <div class="nav-item" onclick="toggleTheme();">🌓 Theme Mode</div>
    <div class="nav-item" onclick="toggleMenu()" style="color:gray;">Close</div>
  </nav>

  <div id="main-container" class="hidden">
    <div class="app-card" style="margin: 0 auto; max-width: 600px;">
      
      <div id="screen-auth">
        <h2 style="font-family: 'Cinzel'; text-align:center;">Welcome</h2>
        <div id="login-box" style="text-align:center;">
          <input type="email" id="auth-email" placeholder="Enter Email" style="width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border);">
          <button class="main-btn" style="width: 85%; background: var(--emerald); color: white;" onclick="handleAuth('register')">Register & Login</button>
          <div style="margin: 15px 0;">OR</div>
          <button class="main-btn" style="width: 85%; background: var(--gold); color: white;" onclick="handleAuth('guest')">Continue as Guest</button>
        </div>
      </div>

      <div id="screen-home" class="hidden">
        <h1 style="font-family: 'Cinzel'; text-align:center; color:var(--emerald);">Islamic Questz</h1>
        <div class="mode-grid">
          <div class="main-btn" onclick="showDailyQuran()">📖<br>Qur'an Journey</div>
          <div class="main-btn" onclick="showScreen('ramadan-grid')">🌙<br>Ramadan Quiz</div>
          <div class="main-btn" onclick="openLearningQuiz()">📖<br>Learning</div>
          <div class="main-btn" onclick="showQiblaCompass()">🕋<br>Qibla</div>
          <div class="main-btn" onclick="loadLeaderboard()">🏆<br>Leaderboard</div>
          <div class="main-btn" onclick="shareApp()">📤<br>Invite</div>
        </div>
        <button id="install-btn" class="main-btn" style="width: 100%; margin-top: 20px; background: #3b82f6; color: white;">📲 Install App</button>
      </div>

      <div id="screen-content" class="hidden">
        <button class="back-btn" onclick="showScreen('home')">← Back</button>
        <div id="dynamic-body"></div>
      </div>
    </div>
  </div>

  <script>
    /* --- Firebase Config --- */
    const firebaseConfig = {
      apiKey: "AIzaSyD6v6BFkqUmgfJWGIm1eMEEOQX7wnWkq8k",
      authDomain: "islamicquestz.firebaseapp.com",
      databaseURL: "https://islamicquestz-default-rtdb.firebaseio.com",
      projectId: "islamicquestz",
      storageBucket: "islamicquestz.firebasestorage.app",
      appId: "1:740000996250:web:444a3b4ba9c92dad64b823",
      messagingSenderId: "740000996250",
      measurementId: "G-YSH95XR38D"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* --- Qur'an Journey Data (Add your Surahs/Pages here) --- */
    const QURAN_JOURNEY = [
      {
        day: 1, title: "Surah Al-Fatihah", 
        arabic: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ (1) الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (2)...",
        urdu: "اللہ کے نام سے شروع جو بڑا مہربان نہایت رحم والا ہے۔ سب تعریفیں اللہ کے لیے ہیں...",
        hinglish: "Allah ke naam se shuru jo bada meherbaan... Sab tareefein Allah ke liye hain...",
        audioUrl: "https://everyayah.com/data/Alafasy_128kbps/001001.mp3",
        pages: "Complete"
      },
      {
        day: 2, title: "Surah Al-Baqarah (Pages 1-2)", 
        arabic: "الم (1) ذَٰلِكَ الْكِتَابُ لَا رَيْبَ ۛ فِيهِ ۛ هُدًى لِّلْمُتَّقِينَ (2)...",
        urdu: "الف لام میم۔ یہ وہ کتاب ہے جس میں کوئی شک نہیں، ہدایت ہے ڈرنے والوں کے لیے...",
        hinglish: "Alif-Laam-Meem. Yeh woh kitab hai jisme koi shak nahi, hidayat hai darne walon ke liye...",
        audioUrl: "https://everyayah.com/data/Alafasy_128kbps/002001.mp3",
        pages: "1-2"
      }
    ];

    /* --- Core Functions --- */
    function showScreen(id) {
      ['screen-auth', 'screen-home', 'screen-content'].forEach(s => document.getElementById(s).classList.add('hidden'));
      const target = id === 'ramadan-grid' ? 'content' : id;
      document.getElementById('screen-' + target).classList.remove('hidden');
      if (id === 'ramadan-grid') renderRamadanGrid();
      if (document.getElementById('sidebar').classList.contains('open')) toggleMenu();
    }

    function showDailyQuran() {
        showScreen('content');
        const body = document.getElementById('dynamic-body');
        body.innerHTML = `<h2 style="text-align:center;">📖 Qur'an Journey</h2><div id="quran-container" style="text-align:center;">Loading...</div>`;

        db.ref('quranJourney/currentDay').on('value', snap => {
            const currentDay = snap.val() || 1;
            const data = QURAN_JOURNEY.find(j => j.day === currentDay);
            if (!data) return body.innerHTML = "<p>New content coming soon!</p>";
            renderQuranDisplay(data, currentDay);
        });
    }

    function renderQuranDisplay(d, dayNum) {
        const isAdmin = localStorage.getItem('is_admin') === 'true';
        const adminBtn = isAdmin ? `<button onclick="db.ref('quranJourney/currentDay').set(${dayNum + 1})" class="main-btn" style="background:var(--gold); color:white; margin-top:20px;">🔓 Unlock Next Day</button>` : '';

        document.getElementById('quran-container').innerHTML = `
            <div class="dua-card">
                <h3 style="color:var(--emerald);">${d.title}</h3>
                <p style="font-size:0.8rem; color:gray;">Journey Day ${d.day} (${d.pages})</p>
                <div style="font-size:1.6rem; direction:rtl; margin:20px 0; font-family:serif; line-height:1.8; background:#fffcf0; padding:15px; border-radius:10px;">${d.arabic}</div>
                <div style="text-align:left; border-top:2px solid var(--soft-gold); padding-top:15px;">
                    <p style="font-weight:bold; color:var(--emerald);">Urdu:</p><p>${d.urdu}</p>
                    <p style="font-weight:bold; color:var(--gold);">Hinglish:</p><p style="font-style:italic;">${d.hinglish}</p>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                    <button class="main-btn" onclick="new Audio('${d.audioUrl}').play()">▶ Play Audio</button>
                    <button class="main-btn" style="background:var(--emerald); color:white;" onclick="viewArchive()">📜 Archive</button>
                </div>
            </div> ${adminBtn}`;
    }

    function viewArchive() {
        const body = document.getElementById('dynamic-body');
        body.innerHTML = `<h2 style="text-align:center;">📜 Qur'an Archive</h2><div id="archive-list"></div>`;
        db.ref('quranJourney/currentDay').once('value', snap => {
            const maxDay = snap.val() || 1;
            QURAN_JOURNEY.forEach(item => {
                if (item.day <= maxDay) {
                    const row = document.createElement('div');
                    row.className = 'dua-card'; row.style.cursor = 'pointer';
                    row.innerHTML = `<strong>Day ${item.day}:</strong> ${item.title}`;
                    row.onclick = () => renderQuranDisplay(item, maxDay);
                    document.getElementById('archive-list').appendChild(row);
                }
            });
        });
    }

    /* --- Auth & Initialization --- */
    function handleAuth(type) {
      let u = { name: type === 'guest' ? "Guest_" + Math.floor(Math.random()*9000) : document.getElementById('auth-email').value.split('@')[0] };
      localStorage.setItem('iq_user', JSON.stringify(u)); 
      loginUser(u);
    }
    function loginUser(u) {
      document.getElementById('screen-auth').classList.add('hidden');
      document.getElementById('screen-home').classList.remove('hidden');
      document.getElementById('menu-btn').classList.remove('hidden');
      document.getElementById('user-display-name').innerText = u.name;
    }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

    window.addEventListener('load', () => {
      const checkAdmin = new URLSearchParams(window.location.search).get('master');
      if (checkAdmin === 'admin786') localStorage.setItem('is_admin', 'true');
      setTimeout(() => { 
        document.getElementById('bismillah-overlay').classList.add('hidden'); 
        document.getElementById('main-container').classList.remove('hidden');
        const saved = localStorage.getItem('iq_user'); if (saved) loginUser(JSON.parse(saved));
      }, 2500);
    });
  </script>
</body>
</html>
